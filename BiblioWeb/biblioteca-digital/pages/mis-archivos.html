<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis archivos — Biblioteca Digital</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    .header-bar {
      background: var(--brown-900); color: #fff; padding: 28px 20px 0;
    }
    .header-inner { max-width: 1100px; margin: 0 auto; padding-bottom: 28px; }
    .header-inner h1 { font-family: 'Crimson Pro', serif; font-size: 30px; font-weight: 400; color: #fff; margin-bottom: 4px; }
    .header-inner p  { font-size: 13px; color: rgba(255,255,255,.6); }
    .header-stats { display: flex; gap: 28px; margin-top: 20px; }
    .hstat-num   { font-size: 24px; font-weight: 600; color: #fff; line-height: 1; }
    .hstat-label { font-size: 11px; color: rgba(255,255,255,.55); }

    .search-bar-sm {
      background: #fff; border: 1.5px solid var(--cream-300); border-radius: var(--radius-pill);
      display: flex; align-items: center; gap: 10px; padding: 0 16px; max-width: 400px; transition: border-color .2s;
    }
    .search-bar-sm:focus-within { border-color: var(--amber); }
    .search-bar-sm input { border: none; outline: none; background: transparent; font-size: 14px; color: var(--text-primary); padding: 11px 0; width: 100%; }
    .search-bar-sm input::placeholder { color: var(--text-muted); }

    .files-list { display: flex; flex-direction: column; gap: 10px; }

    .delete-confirm {
      position: fixed; inset: 0; background: rgba(59,31,26,.5); display: none;
      align-items: center; justify-content: center; z-index: 100;
    }
    .delete-confirm.show { display: flex; }
    .delete-card {
      background: #fff; border-radius: var(--radius-lg); padding: 36px 32px; text-align: center;
      max-width: 380px; width: 90%; box-shadow: var(--shadow-md);
    }
    .delete-card h3 { font-family: 'Crimson Pro', serif; font-size: 22px; margin-bottom: 8px; color: var(--text-primary); }
    .delete-card p  { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    .delete-actions { display: flex; gap: 10px; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #a93226; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">BIBLIOTECA<br>UNIVERSIDAD — COLECCIÓN DIGITAL</div>
    <div class="navbar-actions">
      <button class="nav-btn" onclick="window.location.href='dashboard.html'">← Inicio</button>
      <div class="avatar">M</div>
    </div>
  </nav>

  <!-- Header -->
  <div class="header-bar">
    <div class="header-inner">
      <h1>Mis archivos</h1>
      <p>Documentos que has subido a la biblioteca</p>
      <div class="header-stats">
        <div><div class="hstat-num" id="count-total">4</div><div class="hstat-label">Total</div></div>
        <div><div class="hstat-num" id="count-tesis">2</div><div class="hstat-label">Tesis</div></div>
        <div><div class="hstat-num" id="count-art">1</div><div class="hstat-label">Artículo</div></div>
        <div><div class="hstat-num" id="count-lib">1</div><div class="hstat-label">Libro</div></div>
      </div>
    </div>
  </div>

  <main class="page-content">

    <!-- Search + actions row -->
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap">
      <div class="search-bar-sm">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Buscar en mis archivos" id="file-search" oninput="filterFiles()">
      </div>
      <a href="subir.html" class="btn btn-dark" style="width:auto">
        ⬆️ Subir nuevo
      </a>
    </div>

    <!-- Files list -->
    <div class="files-list" id="files-list"></div>

    <div id="empty-files" style="display:none">
      <div class="empty-state">
        <p>📂</p>
        <p style="font-size:16px;font-weight:500;color:var(--text-secondary)">No hay archivos que coincidan</p>
        <p style="font-size:14px;margin-top:4px">Intenta con otro término</p>
      </div>
    </div>

    <div style="margin-top:32px;text-align:center">
      <a href="dashboard.html" class="btn btn-outline" style="width:auto">
        ← Volver al inicio
      </a>
    </div>

  </main>

  <!-- Delete confirm modal -->
  <div class="delete-confirm" id="delete-modal">
    <div class="delete-card">
      <div style="font-size:40px;margin-bottom:12px">🗑️</div>
      <h3>¿Eliminar documento?</h3>
      <p id="delete-doc-name">Esta acción no se puede deshacer.</p>
      <div class="delete-actions">
        <button class="btn btn-outline" style="flex:1" onclick="closeDelete()">Cancelar</button>
        <button class="btn btn-danger" style="flex:1" onclick="confirmDelete()">Eliminar</button>
      </div>
    </div>
  </div>

  <script>
    let files = [
      { id:1, tipo:'tesis',   emoji:'🎓', titulo:'El romanticismo tardío en la literatura mexicana', autor:'García Martínez, L. A.', anio:2022, size:'3.2 MB', estado:'pendiente', nuevo:true  },
      { id:2, tipo:'tesis',   emoji:'🎓', titulo:'Análisis socioeconómico del desarrollo rural en Oaxaca', autor:'Ramírez López, C.', anio:2024, size:'2.1 MB', estado:'publicado', nuevo:false },
      { id:3, tipo:'articulo',emoji:'📄', titulo:'IA aplicada a la catalogación de acervos bibliotecarios', autor:'Hernández Ruiz, P.', anio:2023, size:'1.8 MB', estado:'publicado', nuevo:false },
      { id:4, tipo:'libro',   emoji:'📚', titulo:'El laberinto de la soledad', autor:'Paz, O.', anio:1993, size:'2.4 MB', estado:'publicado', nuevo:false },
    ];

    let deleteTarget = null;

    function statusBadge(f) {
      if (f.nuevo && f.estado === 'pendiente')
        return `<span class="badge badge-amber">⏳ Pendiente aprobación</span>`;
      if (f.estado === 'publicado')
        return `<span class="badge badge-green">✓ Publicado</span>`;
      return `<span class="badge badge-gray">${f.estado}</span>`;
    }

    function renderFiles(list) {
      const container = document.getElementById('files-list');
      const empty     = document.getElementById('empty-files');

      if (!list.length) { container.innerHTML = ''; empty.style.display = 'block'; return; }
      empty.style.display = 'none';

      container.innerHTML = list.map(f => `
        <div class="file-item" id="file-${f.id}">
          <div style="font-size:26px">${f.emoji}</div>
          <div class="file-info">
            <div class="file-name">${f.titulo}</div>
            <div class="file-meta">${f.autor} · ${f.anio} · ${f.size}</div>
            <div class="file-status">
              ${f.nuevo ? '<span style="background:var(--amber);color:#fff;border-radius:999px;padding:1px 8px;font-size:10px;font-weight:600;margin-right:4px">Nuevo</span>' : ''}
              <span style="font-size:11px;color:var(--text-muted);text-transform:capitalize">${f.tipo}</span>
              &nbsp;·&nbsp; ${statusBadge(f)}
            </div>
          </div>
          <div class="file-actions">
            <button class="icon-btn" title="Vista previa" onclick="previewDoc(${f.id})">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="icon-btn danger" title="Eliminar" onclick="askDelete(${f.id}, '${f.titulo.replace(/'/g,"\\'")}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>`).join('');

      updateCounts(list);
    }

    function updateCounts(list) {
      document.getElementById('count-total').textContent = files.length;
      document.getElementById('count-tesis').textContent = files.filter(f=>f.tipo==='tesis').length;
      document.getElementById('count-art').textContent   = files.filter(f=>f.tipo==='articulo').length;
      document.getElementById('count-lib').textContent   = files.filter(f=>f.tipo==='libro').length;
    }

    function filterFiles() {
      const q = document.getElementById('file-search').value.toLowerCase();
      renderFiles(files.filter(f => !q || f.titulo.toLowerCase().includes(q) || f.autor.toLowerCase().includes(q)));
    }

    function previewDoc(id) {
      window.location.href = 'citas.html';
    }

    function askDelete(id, name) {
      deleteTarget = id;
      document.getElementById('delete-doc-name').textContent = `"${name}" será eliminado permanentemente.`;
      document.getElementById('delete-modal').classList.add('show');
    }

    function closeDelete() {
      deleteTarget = null;
      document.getElementById('delete-modal').classList.remove('show');
    }

    function confirmDelete() {
      if (deleteTarget === null) return;
      files = files.filter(f => f.id !== deleteTarget);
      closeDelete();
      filterFiles();
    }

    // Init
    renderFiles(files);
  </script>
</body>
</html>
