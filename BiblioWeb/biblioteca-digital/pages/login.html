<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicia sesión — Biblioteca Digital</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--cream-100); }

    .hero {
      background: var(--brown-900); color: #fff;
      display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 56px);
    }

    /* Left: cover image side */
    .hero-cover {
      position: relative; overflow: hidden;
      background: linear-gradient(160deg, var(--brown-800) 0%, var(--brown-900) 100%);
    }
    .hero-cover-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(to bottom, rgba(59,31,26,.55) 0%, rgba(59,31,26,.75) 100%),
        url('https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=900&q=80') center/cover no-repeat;
    }
    .hero-cover-content {
      position: relative; z-index: 1; padding: 52px 48px;
      display: flex; flex-direction: column; justify-content: flex-end; height: 100%;
    }
    .hero-cover-content h1 {
      font-family: 'Crimson Pro', serif; font-size: 56px; font-weight: 400;
      line-height: 1.1; margin-bottom: 16px; color: #fff;
    }
    .hero-cover-content h1 em { color: var(--amber-light); font-style: italic; }
    .hero-cover-content p { font-size: 15px; color: rgba(255,255,255,.7); max-width: 360px; line-height: 1.6; }

    /* Right: login form */
    .hero-form {
      background: var(--cream-100); display: flex; flex-direction: column;
      justify-content: center; padding: 52px 56px;
    }
    .form-title { font-family: 'Crimson Pro', serif; font-size: 36px; font-weight: 400; color: var(--text-primary); margin-bottom: 4px; }
    .form-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
    .form-stack { display: flex; flex-direction: column; gap: 14px; }

    @media (max-width: 768px) {
      .hero { grid-template-columns: 1fr; }
      .hero-cover { display: none; }
      .hero-form { padding: 40px 24px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-brand">BIBLIOTECA<br>UNIVERSIDAD — COLECCIÓN DIGITAL</div>
  </nav>

  <div class="hero">

    <div class="hero-cover">
      <div class="hero-cover-bg"></div>
      <div class="hero-cover-content">
        <h1>Tu próxima<br><em>gran lectura</em><br>te espera</h1>
        <p>Más de 12,000 títulos organizados y disponibles para ti en cualquier momento.</p>
      </div>
    </div>

    <div class="hero-form">
      <h2 class="form-title">Inicia sesión</h2>
      <p class="form-subtitle">Accede a tu cuenta</p>

      <div class="form-stack">
        <div class="input-group">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" placeholder="Correo electrónico" autocomplete="email" id="f-email">
        </div>

        <div class="input-group">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
          <input type="password" placeholder="Contraseña" autocomplete="current-password" id="f-password">
        </div>

        <button class="btn btn-primary btn-full" id="btn-google">
          Entrar con Google
        </button>

        <div class="divider"><span>o</span></div>

        <button class="btn btn-outline" onclick="window.location.href='catalogo.html'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          Entrar sin iniciar sesión
        </button>
      </div>
    </div>

  </div>

  <script type="module">
    // Importamos las funciones necesarias desde la CDN oficial para usar módulos en el navegador
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Tus datos de configuración reales de BiblioWeb
    const firebaseConfig = {
      apiKey: "AIzaSyBPxXw8pCaubDU0ynSCW7tGYfAvlVVqvgM",
      authDomain: "biblioweb-1efc6.firebaseapp.com",
      projectId: "biblioweb-1efc6",
      storageBucket: "biblioweb-1efc6.firebasestorage.app",
      messagingSenderId: "688727975714",
      appId: "1:688727975714:web:7cf8556eddc5fbeb10e77b",
      measurementId: "G-Y8JHDHN33N"
    };

    // Inicializamos Firebase y la autenticación
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Función para manejar el inicio de sesión
    async function iniciarSesionConGoogle() {
      try {
        const resultado = await signInWithPopup(auth, provider);
        const usuario = resultado.user;
        
        console.log("Sesión iniciada correctamente:", usuario.displayName, usuario.email);
        
        // Redirección automática al dashboard tras validar el login exitoso
        window.location.href = 'dashboard.html';
        
      } catch (error) {
        console.error("Error al autenticar con Google:", error.code, error.message);
        alert("No se pudo completar el inicio de sesión: " + error.message);
      }
    }

    // Escuchar el click en tu botón para ejecutar la ventana de Google
    document.getElementById('btn-google').addEventListener('click', iniciarSesionConGoogle);
  </script>

</body>
</html>
