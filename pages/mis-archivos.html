<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis archivos — Biblioteca Digital</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/mis-archivos.css">
    <script src="../assets/js/mis-archivos.js"></script>
    <script src="../assets/js/cuenta.js" defer></script>
</head>

<body>

    <nav class="navbar">
        <div class="navbar-brand">BIBLIOWEB<br>COLECCIÓN DIGITAL</div>
        <div class="navbar-actions">
            <button class="nav-btn" onclick="window.location.href='dashboard.html'">← Inicio</button>
            <div class="avatar" id="global-avatar">-</div>
        </div>
    </nav>

    <div class="header-bar">
        <div class="header-inner">
            <h1>Mis archivos</h1>
            <p>Documentos que has subido a la biblioteca</p>
            <div class="header-stats">
                <div>
                    <div class="hstat-num" id="count-total">0</div>
                    <div class="hstat-label">Total</div>
                </div>
                <div>
                    <div class="hstat-num" id="count-tesis">0</div>
                    <div class="hstat-label">Tesis</div>
                </div>
                <div>
                    <div class="hstat-num" id="count-art">0</div>
                    <div class="hstat-label">Artículo</div>
                </div>
                <div>
                    <div class="hstat-num" id="count-lib">0</div>
                    <div class="hstat-label">Libro</div>
                </div>
                <div>
                    <div class="hstat-num" id="count-otro">0</div>
                    <div class="hstat-label">Otro</div>
            </div>
        </div>
    </div>

    <main class="page-content">

        <div class="search-actions-row">
            <div class="search-bar-sm">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" placeholder="Buscar en mis archivos" id="file-search" oninput="filterFiles()">
            </div>
            <a href="subir.html" class="btn btn-dark btn-auto">
                ⬆️ Subir nuevo
            </a>
        </div>

        <div class="files-list" id="files-list"></div>

        <div id="empty-files" class="empty-files-wrapper">
            <div class="empty-state">
                <p>📂</p>
                <p class="empty-state-title">No hay archivos que coincidan</p>
                <p class="empty-state-sub">Intenta con otro término</p>
            </div>
        </div>

        <div class="back-btn-row">
            <a href="dashboard.html" class="btn btn-outline btn-auto">
                ← Volver al inicio
            </a>
        </div>

    </main>

    <div class="delete-confirm" id="delete-modal">
        <div class="delete-card">
            <div class="delete-icon">🗑️</div>
            <h3>¿Eliminar documento?</h3>
            <p id="delete-doc-name">Esta acción no se puede deshacer.</p>
            <div class="delete-actions">
                <button class="btn btn-outline btn-flex" onclick="closeDelete()">Cancelar</button>
                <button class="btn btn-danger btn-flex" onclick="confirmDelete()">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Modal de cuenta -->
    <div class="cuenta-overlay" id="cuenta-overlay">
        <div class="cuenta-box">
            <div class="cuenta-avatar-lg" id="cuenta-avatar-lg">-</div>
            <h3>Mi cuenta</h3>

            <div class="cuenta-msg" id="cuenta-msg"></div>

            <div class="cuenta-field">
                <label>Nombre</label>
                <input type="text" id="cuenta-nombre">
            </div>
            <div class="cuenta-field">
                <label>Correo electrónico</label>
                <input type="email" id="cuenta-email">
            </div>
            <div class="cuenta-field">
                <label>Género</label>
                <select id="cuenta-genero">
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                    <option value="O">Otro</option>
                </select>
            </div>

            <div class="cuenta-actions">
                <button class="btn btn-outline btn-flex" onclick="cerrarModalCuenta()">Cancelar</button>
                <button class="btn btn-dark btn-flex" onclick="guardarCuenta()">Guardar cambios</button>
            </div>
        </div>
    </div>
</body>

</html>
