<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — BiblioWeb</title>
    <link rel="icon" type="image/png" href="../assets/img/logo.png">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body class="login-body">

    <nav class="navbar">
        <div class="navbar-brand">BIBLIOWEB<br>COLECCIÓN DIGITAL</div>
    </nav>

    <div class="hero-login">
    <div class="hero-cover-login">
        <div class="hero-cover-bg-login"></div>
        <div class="hero-cover-content-login">
            <h1>Recupera el acceso<br>a tu <em>cuenta</em></h1>
            <p>Estamos aquí para ayudarte a volver a tu colección de documentos académicos.</p>
        </div>
    </div>

    <div class="hero-form-login">
        <h2 class="form-title-login">Recuperar contraseña</h2>
            <h2 class="form-title-login">Recuperar contraseña</h2>
            <p class="form-subtitle-login" id="recuperar-subtitle">Ingresa tu correo para continuar</p>

            <div class="form-stack-login">
                <div class="error-msg" id="error-msg"><span id="error-text"></span></div>
                <div class="success-msg" id="success-msg" style="display:none"></div>

                <!-- PASO 1: correo -->
                <div id="paso-email">
                    <div class="login-custom-input">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="3" />
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
                        </svg>
                        <input type="email" placeholder="Correo electrónico" id="r-email">
                    </div>
                    <button class="btn-entrar-login" id="btn-verificar-email">Continuar</button>
                </div>

                <!-- PASO 2: nombre + nueva contraseña (oculto al inicio) -->
                <div id="paso-reset" style="display:none">
                    <div class="login-custom-input">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="8" r="5" />
                            <path d="M20 21a8 8 0 1 0-16 0" />
                        </svg>
                        <input type="text" placeholder="Nombre completo (como te registraste)" id="r-nombre">
                    </div>
                    <div class="login-custom-input">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            <circle cx="12" cy="16" r="1.5" fill="currentColor" />
                        </svg>
                        <input type="password" placeholder="Nueva contraseña" id="r-password">
                    </div>
                    <div class="login-custom-input">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            <circle cx="12" cy="16" r="1.5" fill="currentColor" />
                        </svg>
                        <input type="password" placeholder="Confirmar nueva contraseña" id="r-password-confirm">
                    </div>
                    <button class="btn-entrar-login" id="btn-restablecer">Restablecer contraseña</button>
                </div>

                <button class="btn-login-outline-custom" onclick="window.location.href='login.html'">
                    ← Volver a iniciar sesión
                </button>
            </div>
        </div>
    </div>

    <script>
        const PHP_URL_VERIFICAR = 'https://bibliowebb.com.mx/assets/php/verificar_recuperacion.php';
        const PHP_URL_RESTABLECER = 'https://bibliowebb.com.mx/assets/php/restablecer_password.php';

        let emailVerificado = '';

        function mostrarError(msg) {
            const el = document.getElementById('error-msg');
            document.getElementById('error-text').textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }

        function mostrarExito(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }

        function ocultarMensajes() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }

        document.getElementById('btn-verificar-email').addEventListener('click', async () => {
            ocultarMensajes();
            const email = document.getElementById('r-email').value.trim();

            if (!email) {
                mostrarError('Ingresa tu correo electrónico.');
                return;
            }

            const btn = document.getElementById('btn-verificar-email');
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const formData = new FormData();
                formData.append('email', email);

                const res = await fetch(PHP_URL_VERIFICAR, { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    emailVerificado = email;
                    document.getElementById('paso-email').style.display = 'none';
                    document.getElementById('paso-reset').style.display = 'block';
                    document.getElementById('recuperar-subtitle').textContent = 'Confirma tu identidad para continuar';
                } else {
                    mostrarError(data.message);
                }
            } catch (err) {
                console.error('Error verificando correo:', err);
                mostrarError('Error de conexión con el servidor.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Continuar';
            }
        });

        document.getElementById('btn-restablecer').addEventListener('click', async () => {
            ocultarMensajes();
            const nombre = document.getElementById('r-nombre').value.trim();
            const password = document.getElementById('r-password').value;
            const passwordConfirm = document.getElementById('r-password-confirm').value;

            if (!nombre || !password || !passwordConfirm) {
                mostrarError('Todos los campos son obligatorios.');
                return;
            }

            if (password !== passwordConfirm) {
                mostrarError('Las contraseñas no coinciden.');
                return;
            }

            if (password.length < 6) {
                mostrarError('La contraseña debe tener al menos 6 caracteres.');
                return;
            }

            const btn = document.getElementById('btn-restablecer');
            btn.disabled = true;
            btn.textContent = 'Restableciendo...';

            try {
                const formData = new FormData();
                formData.append('email', emailVerificado);
                formData.append('nombre', nombre);
                formData.append('nueva_password', password);

                const res = await fetch(PHP_URL_RESTABLECER, { method: 'POST', body: formData });
                const data = await res.json();

                if (data.success) {
                    mostrarExito('¡Contraseña actualizada! Redirigiendo al inicio de sesión...');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    mostrarError(data.message);
                }
            } catch (err) {
                console.error('Error restableciendo contraseña:', err);
                mostrarError('Error de conexión con el servidor.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Restablecer contraseña';
            }
        });
    </script>

</body>

</html>
